# =================================================================== #
#                     QZXBotSync 插件配置文件                           #
#                          作者: ytsj                                 #
# =================================================================== #
# 本插件通过 NapCatQQ (OneBot 11) WebSocket 将 MC 服务器事件同步到 QQ 群
# 修改配置后请使用 /qzxbot reload 重载

# ==================== NapCat WebSocket 连接设置 ====================
napcat:
  ws-url: "ws://192.168.1.186:20000/?access_token=000000"
  reconnect-interval: 10

# ==================== QQ 群设置 ====================
qq-groups:
  - 123456789

# ==================== 服务器信息 ====================
# 插件会按优先级自动读取服务器名称:
#   1. 此处配置的非空值（非"默认服务器"）
#   2. server.properties 中的 motd=xxx
#   3. server.properties 中的 server-name=xxx
#   4. 都不存在则显示"默认服务器"
server-name: ""

# ==================== 消息同步开关 ====================
sync:
  join: true
  quit: true
  chat: true
  death: true
  weather: true
  advancement: true
  reverse: true
  recall: true

# ==================== 转发统计 ====================
stats:
  show-all-groups: false

# ==================== 认证系统 ====================
auth:
  enabled: true

  # 运行模式: main(主服,完整功能) / verify(认证子服,仅验证正版并回传)
  mode: main

  # 正版验证子服地址 (仅 mode=main 时生效)
  # 玩家点正版登录后会 transfer 到这个子服做 Mojang 在线验证
  auth-server-address: "localhost:25566"

  # 主服地址 (仅 mode=verify 时生效)
  # 认证完成后 transfer 回主服
  main-server-address: "localhost:25565"

  # 共享数据目录，主服和认证服指向同一路径 (绝对路径)
  # 用于传递正版验证结果
  shared-data-dir: "plugins/QZXBotSync/shared"

  min-password-length: 4
  max-password-length: 32
  max-login-attempts: 3
  session-timeout-minutes: 5
